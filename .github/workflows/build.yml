name: CI (DevContainer Build & Test)

on:
  workflow_call:
    inputs:
      release_tag:
        description: "Git release tag to verify against pyproject.toml (e.g. 1.2.3)."
        required: false
        default: ""
        type: string
      uv_version:
        description: "uv version for the Docker build"
        required: false
        default: "0.10.9"
        type: string
      depsight_version:
        description: "Desight wheel version to install in the DevContainer"
        required: false
        default: "1.0.0"
        type: string
      push_image:
        description: "Push the container image to Docker Hub"
        required: false
        default: false
        type: boolean


env:
  DEPSIGHT_VERSION: ${{ inputs.depsight_version }}
  PYTHON_VERSION: "3.12"
  UV_VERSION: ${{ inputs.uv_version }}

jobs:
  build_wheel:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify release tag matches pyproject.toml
        if: ${{ inputs.release_tag != '' }}
        env:
          TAG: ${{ inputs.release_tag }}
        run: |
          set -euo pipefail

          echo "::group::Version check"

          toml_version=$(grep '^version' pyproject.toml | sed 's/version = "\(.*\)"/\1/')
          echo "Parsed '$TAG' as Git tag"
          echo "Parsed '$toml_version' from pyproject.toml"

          if [[ "$TAG" != "$toml_version" ]]; then
            echo "::error::Tag '$TAG' does not match pyproject.toml version '$toml_version'"
            exit 1
          fi

          echo "Tag and pyproject.toml version match ('$TAG')"

          echo "::endgroup::"

      - name: Lint, test & build wheel
        uses: devcontainers/ci@v0.3
        with:
          configFile: .devcontainer/devcontainer.json
          runCmd: |

            set -e

            echo "::group::Environment Hel"
            python --version
            pip --version
            which python
            echo "::endgroup::"

            source .venv/bin/activate

            echo "::group::CLI health check"
            deply --help
            echo "::endgroup::"

            echo "::group::Ruff linting"
            ruff check src/ tests/
            echo "::endgroup::"

            echo "::group::Type checking"
            mypy src/
            echo "::endgroup::"

            echo "::group::Pytest"
            python -m pytest tests/ -v --tb=short
            echo "::endgroup::"

            echo "::group::Build wheel"
            uv build
            ls -lah dist
            echo "::endgroup::"

            echo "::group::Stage depsight wheel"
            mkdir -p wheels
            cp /opt/depsight-wheels/*.whl wheels/
            ls -lah wheels
            echo "::endgroup::"

      - name: Upload plugin wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: plugin-wheel
          path: dist/*.whl
          if-no-files-found: error

      - name: Upload depsight wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: depsight-wheel
          path: wheels/*.whl
          if-no-files-found: error

  build_container:
    runs-on: ubuntu-latest
    needs: build_wheel
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download plugin wheel artifact
        uses: actions/download-artifact@v4
        with:
          name: plugin-wheel
          path: dist/

      - name: Download depsight wheel artifact
        uses: actions/download-artifact@v4
        with:
          name: depsight-wheel
          path: wheels/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: ${{ inputs.push_image }}
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PAT }}

      - name: Build (and push) Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: ${{ inputs.push_image == true }}
          tags: |
            ${{ vars.DOCKER_USER }}/${{ vars.DOCKER_REPO }}:latest
            ${{ vars.DOCKER_USER }}/${{ vars.DOCKER_REPO }}:uv${{ inputs.uv_version || '0.10.9' }}
          build-args: |
            UV_VERSION=${{ inputs.uv_version || '0.10.9' }}
